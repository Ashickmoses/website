<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zion Gaming</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --fire-orange: #FF6B00;
    --fire-red: #E63000;
    --gold: #FFB800;
    --dark: #0A0A0A;
    --dark2: #111111;
    --dark3: #1A1A1A;
    --card: #181818;
    --border: #2A2A2A;
    --text: #F0F0F0;
    --muted: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated fire background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 40% at 50% 100%, rgba(255,107,0,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 60% 30% at 20% 80%, rgba(230,48,0,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 30% at 80% 70%, rgba(255,184,0,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    background: linear-gradient(135deg, var(--fire-red) 0%, var(--fire-orange) 50%, #FF8C00 100%);
    padding: 0;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 30px rgba(255,107,0,0.5);
  }

  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 20px,
      rgba(0,0,0,0.05) 20px,
      rgba(0,0,0,0.05) 40px
    );
  }

  .header-inner {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px 24px;
    gap: 12px;
  }

  header h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.4), 0 0 30px rgba(255,200,0,0.3);
    letter-spacing: 2px;
  }

  .flame { font-size: 1.5em; animation: flicker 1.5s ease-in-out infinite alternate; }
  .flame:last-child { animation-delay: 0.3s; }

  @keyframes flicker {
    0% { transform: scale(1) rotate(-3deg); filter: brightness(1); }
    100% { transform: scale(1.1) rotate(3deg); filter: brightness(1.3); }
  }

  /* Gold divider */
  .divider {
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--fire-orange), var(--gold), transparent);
    box-shadow: 0 0 12px var(--gold);
  }

  main {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 16px 60px;
  }

  /* Section cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--fire-orange), transparent);
  }

  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 1px;
    margin-bottom: 24px;
    text-align: center;
  }

  /* Form */
  .form-group {
    margin-bottom: 16px;
  }

  input[type="text"], input[type="tel"] {
    width: 100%;
    background: #0D0D0D;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 1rem;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input[type="text"]:focus, input[type="tel"]:focus {
    border-color: var(--fire-orange);
    box-shadow: 0 0 0 3px rgba(255,107,0,0.15);
  }

  input::placeholder { color: #555; }

  .btn-register {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 15px;
    background: linear-gradient(135deg, var(--fire-red), var(--fire-orange));
    color: #fff;
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(255,107,0,0.4);
  }

  .btn-register:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(255,107,0,0.55);
  }

  .btn-register:active { transform: translateY(0); }

  /* Success message */
  .toast {
    display: none;
    background: linear-gradient(135deg, #1a3a1a, #0d2a0d);
    border: 1px solid #2ecc71;
    border-radius: 8px;
    padding: 14px 18px;
    margin-top: 14px;
    color: #2ecc71;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    text-align: center;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Tournament details */
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 500px) { .detail-grid { grid-template-columns: 1fr; } }

  .detail-item {
    background: #0D0D0D;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .detail-icon { font-size: 1.5rem; flex-shrink: 0; }

  .detail-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .detail-value {
    font-family: 'Orbitron', monospace;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--gold);
  }

  /* Team list */
  .team-count {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    color: var(--muted);
    text-align: right;
    margin-bottom: 12px;
    font-weight: 600;
  }

  .team-count span {
    color: var(--fire-orange);
    font-weight: 700;
  }

  .team-table {
    width: 100%;
    border-collapse: collapse;
  }

  .team-table thead tr {
    background: linear-gradient(135deg, rgba(255,107,0,0.15), rgba(230,48,0,0.1));
  }

  .team-table th {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--fire-orange);
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid rgba(255,107,0,0.3);
  }

  .team-table td {
    padding: 13px 16px;
    font-size: 0.92rem;
    border-bottom: 1px solid #1E1E1E;
    vertical-align: middle;
  }

  .team-table tbody tr {
    transition: background 0.15s;
  }

  .team-table tbody tr:hover {
    background: rgba(255,107,0,0.05);
  }

  .team-table tbody tr:last-child td { border-bottom: none; }

  .rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--muted);
  }

  .rank-badge.gold { background: rgba(255,184,0,0.15); border-color: var(--gold); color: var(--gold); }
  .rank-badge.silver { background: rgba(180,180,180,0.12); border-color: #aaa; color: #ccc; }
  .rank-badge.bronze { background: rgba(205,127,50,0.15); border-color: #cd7f32; color: #cd7f32; }

  .team-name-cell { font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700; color: var(--text); }
  .leader-cell { font-weight: 400; color: #bbb; }
  .phone-cell { font-family: 'Exo 2', sans-serif; color: var(--muted); font-size: 0.85rem; }

  .status-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 700;
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    background: rgba(46,204,113,0.12);
    border: 1px solid rgba(46,204,113,0.3);
    color: #2ecc71;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }

  .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
  .empty-state p { font-family: 'Rajdhani', sans-serif; font-size: 1rem; }

  /* Footer */
  footer {
    text-align: center;
    padding: 20px;
    color: #444;
    font-size: 0.78rem;
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="flame">🔥</span>
    <h1>Free Fire Tournament</h1>
    <span class="flame">🔥</span>
  </div>
</header>
<div class="divider"></div>

<main>

  <!-- Registration Form -->
  <div class="card">
    <div class="section-title">⚔️ Team Registration</div>
    
    <div class="form-group">
      <input type="text" id="teamName" placeholder="Team Name" maxlength="30">
    </div>
    <div class="form-group">
      <input type="text" id="leaderName" placeholder="Leader Name" maxlength="30">
    </div>
    <div class="form-group">
      <input type="tel" id="leaderPhone" placeholder="Leader Phone Number" maxlength="15">
    </div>

    <button class="btn-register" onclick="registerTeam()">REGISTER TEAM</button>
    <div class="toast" id="toast">✅ Team registered successfully!</div>
  </div>

  <!-- Tournament Details -->
  <div class="card">
    <div class="section-title">🏆 Tournament Details</div>
    <div class="detail-grid">
      <div class="detail-item">
        <div class="detail-icon">📅</div>
        <div>
          <div class="detail-label">Date</div>
          <div class="detail-value">20 APR 2026</div>
        </div>
      </div>
      <div class="detail-item">
        <div class="detail-icon">⏰</div>
        <div>
          <div class="detail-label">Time</div>
          <div class="detail-value">6:00 PM</div>
        </div>
      </div>
      <div class="detail-item">
        <div class="detail-icon">💰</div>
        <div>
          <div class="detail-label">Entry Fee</div>
          <div class="detail-value">₹40</div>
        </div>
      </div>
      <div class="detail-item">
        <div class="detail-icon">🥇</div>
        <div>
          <div class="detail-label">Prize Pool</div>
          <div class="detail-value">1st-₹500</div>
         <div class="detail-value">2nd-₹200</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Team List -->
  <div class="card">
    <div class="section-title">📋 Registered Teams</div>
    <div class="team-count">Total Teams: <span id="teamCountDisplay">0</span></div>

    <div id="teamListContainer">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🎮</div>
        <p>No teams registered yet. Be the first!</p>
      </div>
      <table class="team-table" id="teamTable" style="display:none;">
        <thead>
          <tr>
            <th>#</th>
            <th>Team Name</th>
            <th>Leader</th>
            <th>Phone</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="teamTableBody"></tbody>
      </table>
    </div>
  </div>

</main>
<button onclick="clearTeams()" style="margin-top:15px; background:red; color:white; padding:10px; border:none; border-radius:6px; cursor:pointer;">
  🗑️ Clear All Teams
</button>

<script>
let teams = []; // ✅ define first

// LOAD DATA WHEN PAGE LOADS
window.onload = function () {
  loadTeams();
};

// FETCH TEAMS FROM DATABASE
async function loadTeams() {
  try {
    const res = await fetch("getTeams.php");
    teams = await res.json();
    renderTeams();
  } catch (error) {
    console.log("Error loading teams:", error);
  }
}

function getRankClass(i) {
  if (i === 0) return 'gold';
  if (i === 1) return 'silver';
  if (i === 2) return 'bronze';
  return '';
}

function renderTeams() {
  const tbody = document.getElementById('teamTableBody');
  const emptyState = document.getElementById('emptyState');
  const table = document.getElementById('teamTable');
  const countDisplay = document.getElementById('teamCountDisplay');

  countDisplay.textContent = teams.length;

  if (teams.length === 0) {
    emptyState.style.display = 'block';
    table.style.display = 'none';
    return;
  }

  emptyState.style.display = 'none';
  table.style.display = 'table';

  tbody.innerHTML = teams.map((t, i) => `
    <tr>
      <td><span class="rank-badge ${getRankClass(i)}">${i + 1}</span></td>
      <td class="team-name-cell">${t.teamName}</td>
      <td class="leader-cell">${t.leaderName}</td>
      <td class="phone-cell">${t.phone}</td>
      <td><span class="status-badge">Confirmed</span></td>
    </tr>
  `).join('');
}

// REGISTER TEAM
async function registerTeam() {
  const teamName = document.getElementById('teamName').value.trim();
  const leaderName = document.getElementById('leaderName').value.trim();
  const leaderPhone = document.getElementById('leaderPhone').value.trim();
  const toast = document.getElementById('toast');

  if (!teamName || !leaderName || !leaderPhone) {
    toast.style.display = 'block';
    toast.textContent = '⚠️ Fill all fields!';
    return;
  }

  try {
    const res = await fetch("register.php", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        teamName,
        leaderName,
        phone: leaderPhone
      })
    });

    const data = await res.json();

    if (data.status === "success") {
      toast.style.display = 'block';
      toast.textContent = '✅ Team Registered!';

      // ✅ CLEAR INPUTS
      document.getElementById('teamName').value = '';
      document.getElementById('leaderName').value = '';
      document.getElementById('leaderPhone').value = '';

      loadTeams();
    } else {
      alert("Error saving data!");
    }

  } catch (error) {
    console.log(error);
    alert("Server error!");
  }
}

// CLEAR TEAMS (ADMIN)
async function clearTeams() {
  const password = prompt("Enter Admin Password");

  try {
    const res = await fetch("clear.php", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ password })
    });

    const data = await res.json();

    if (data.status === "cleared") {
      alert("✅ All teams cleared!");
      loadTeams();
    } else {
      alert("❌ Wrong password!");
    }

  } catch (error) {
    console.log(error);
    alert("Server error!");
  }
}
</script>
</body>
</html>
